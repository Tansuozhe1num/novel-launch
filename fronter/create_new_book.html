<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建作品 - 小说精品屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 水墨风配色系统 */
            --primary: #2c2c2c;
            --primary-hover: #000000;
            --secondary: #57534e;
            --accent: #b91c1c;
            --paper: #f7f5f0;
            
            --bg-body: #f7f5f0;
            --bg-card: #ffffff;
            --bg-header: rgba(247, 245, 240, 0.95);
            
            --text-main: #1c1917;
            --text-secondary: #57534e;
            --text-light: #a8a29e;
            
            --border: #e7e5e4;
            --border-dark: #d6d3d1;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            
            --radius: 4px;
            --font-serif: 'Noto Serif SC', serif;
            --font-art: 'Ma Shan Zheng', cursive;
        }

        body.dark-mode {
            --bg-body: #1c1917;
            --bg-card: #292524;
            --bg-header: rgba(28, 25, 23, 0.95);
            --text-main: #e7e5e4;
            --text-secondary: #a8a29e;
            --border: #44403c;
            --paper: #292524;
            --primary: #d6d3d1;
            --accent: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-serif);
            background-color: var(--bg-body);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2357534e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; transition: all 0.2s; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-header);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            height: 4.5rem;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-art);
            font-size: 1.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid var(--border-dark);
            color: var(--text-main);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(0,0,0,0.02);
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            flex: 1;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-family: var(--font-art);
        }

        .page-title p {
            color: var(--text-secondary);
            font-family: var(--font-serif);
        }

        .create-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 2rem;
        }

        /* Form Section */
        .form-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 2.5rem;
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        /* 装饰角 */
        .form-card::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid var(--border); pointer-events: none; opacity: 0.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative; z-index: 1;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-family: var(--font-serif);
        }

        .form-label.required::after {
            content: '*';
            color: var(--accent);
            margin-left: 0.25rem;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.75rem 0.5rem;
            border: none;
            border-bottom: 1px solid var(--border-dark);
            background-color: transparent;
            color: var(--text-main);
            font-family: var(--font-serif);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-bottom-color: var(--accent);
            background-color: rgba(0,0,0,0.01);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
            border: 1px solid var(--border-dark); /* 文本域保留边框 */
            padding: 0.75rem;
            margin-top: 0.5rem;
        }
        .form-textarea:focus { border-color: var(--accent); }

        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .tags-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .tag-chip {
            padding: 0.25rem 0.75rem;
            background-color: transparent;
            border: 1px solid var(--border-dark);
            border-radius: 999px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .tag-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tag-chip.selected {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #f7f5f0;
        }

        /* Preview Section */
        .preview-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem;
            position: sticky;
            top: 6rem;
            box-shadow: var(--shadow-sm);
        }

        .preview-header {
            font-weight: 700;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            font-family: var(--font-art);
            font-size: 1.2rem;
            text-align: center;
        }

        .book-preview {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            text-align: center;
        }

        .preview-cover-box {
            width: 140px;
            aspect-ratio: 2/3;
            background-color: var(--bg-body);
            border: 1px dashed var(--border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .preview-cover-box:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(0,0,0,0.02);
        }
        
        .preview-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .preview-cover-box.has-img .preview-cover-img { display: block; }
        .preview-cover-box.has-img .upload-placeholder { display: none; }

        .preview-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
            color: var(--primary);
            font-family: var(--font-art);
        }

        .preview-author {
            font-size: 0.9rem;
            color: var(--accent);
        }

        .preview-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
            text-align: justify;
            width: 100%;
        }

        /* Form Actions */
        .form-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            position: relative; z-index: 1;
        }

        @media (max-width: 900px) {
            .create-layout {
                grid-template-columns: 1fr;
            }
            .preview-card {
                display: none; 
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <i class="fas fa-ink-well"></i>
                <span>小说精品屋</span>
            </a>
            <div class="header-actions">
                <a href="/static/creation.html" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i>
                    返回创作中心
                </a>
                <button id="btnReaderCenter" class="btn btn-outline">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1>提笔著书</h1>
                <p>泼墨挥毫，书写传奇</p>
            </div>
        </div>

        <div class="create-layout">
            <div class="form-card">
                <form id="createBookForm">
                    <div class="form-group">
                        <label class="form-label required">作品名称</label>
                        <input type="text" class="form-input" id="bookName" placeholder="请输入作品名称（2-50字）" maxlength="50" required>
                        <div class="char-count"><span id="nameCount">0</span>/50</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">作品分类</label>
                        <select class="form-select" id="category" required>
                            <option value="">请选择分类</option>
                            <option value="1">玄幻奇幻</option>
                            <option value="2">武侠仙侠</option>
                            <option value="3">都市言情</option>
                            <option value="4">历史军事</option>
                            <option value="5">科幻灵异</option>
                            <option value="6">网游竞技</option>
                            <option value="7">女生频道</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">作品标签</label>
                        <div class="tags-wrapper" id="tagList">
                            <span class="tag-chip" onclick="toggleTag(this)">热血</span>
                            <span class="tag-chip" onclick="toggleTag(this)">重生</span>
                            <span class="tag-chip" onclick="toggleTag(this)">系统</span>
                            <span class="tag-chip" onclick="toggleTag(this)">穿越</span>
                            <span class="tag-chip" onclick="toggleTag(this)">无敌</span>
                            <span class="tag-chip" onclick="toggleTag(this)">轻松</span>
                            <span class="tag-chip" onclick="toggleTag(this)">种田</span>
                        </div>
                        <input type="hidden" id="tags">
                    </div>

                    <div class="form-group">
                        <label class="form-label required">作品简介</label>
                        <textarea class="form-textarea" id="description" placeholder="请输入作品简介（20-500字），好的简介能吸引更多读者" maxlength="500" required></textarea>
                        <div class="char-count"><span id="descCount">0</span>/500</div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="history.back()">取消</button>
                        <button type="submit" class="btn btn-primary">立即创建</button>
                    </div>
                </form>
            </div>

            <div class="preview-card">
                <div class="preview-header">效果预览</div>
                <div class="book-preview">
                    <div class="preview-cover-box" id="coverUploadBox" onclick="document.getElementById('coverInput').click()">
                        <div class="upload-placeholder">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                            <div>点击上传封面</div>
                            <div style="font-size: 0.8rem; margin-top: 0.25rem;">建议尺寸 600x800</div>
                        </div>
                        <img src="" class="preview-cover-img" id="previewImg">
                        <input type="file" id="coverInput" accept="image/*" style="display: none" onchange="previewCover(this)">
                    </div>
                    <div>
                        <div class="preview-title" id="previewTitle">作品名称</div>
                        <div class="preview-author">作者：<span id="authorName">我</span></div>
                    </div>
                    <div class="preview-desc" id="previewDesc">
                        作品简介将显示在这里...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme check
            if (localStorage.getItem('novel-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // Real-time preview
            const nameInput = document.getElementById('bookName');
            const descInput = document.getElementById('description');
            
            nameInput.addEventListener('input', function() {
                document.getElementById('nameCount').textContent = this.value.length;
                document.getElementById('previewTitle').textContent = this.value || '作品名称';
            });

            descInput.addEventListener('input', function() {
                document.getElementById('descCount').textContent = this.value.length;
                document.getElementById('previewDesc').textContent = this.value || '作品简介将显示在这里...';
            });

            // Form submission
            document.getElementById('createBookForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('作品创建功能开发中... (后端API未对接)');
                // 实际对接时，这里会收集表单数据并发起 fetch POST 请求
            });
            
            // User check
            const token = localStorage.getItem('auth_token');
            if(token) {
                 // Fetch user info to populate author name if needed
            } else {
                location.href = '/static/auth.html';
            }
        });

        function toggleTag(el) {
            el.classList.toggle('selected');
            updateTags();
        }

        function updateTags() {
            const selected = Array.from(document.querySelectorAll('.tag-chip.selected'))
                .map(el => el.textContent);
            document.getElementById('tags').value = selected.join(',');
        }

        function previewCover(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('coverUploadBox').classList.add('has-img');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
