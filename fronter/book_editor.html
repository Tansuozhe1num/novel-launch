<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品管理 - 小说精品屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 水墨风配色系统 */
            --primary: #2c2c2c;
            --primary-hover: #000000;
            --secondary: #57534e;
            --accent: #b91c1c;
            --paper: #f7f5f0;
            
            --bg-body: #f7f5f0;
            --bg-card: #ffffff;
            --bg-header: rgba(247, 245, 240, 0.95);
            
            --text-main: #1c1917;
            --text-secondary: #57534e;
            --text-light: #a8a29e;
            
            --border: #e7e5e4;
            --border-dark: #d6d3d1;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            
            --radius: 4px;
            --font-serif: 'Noto Serif SC', serif;
            --font-art: 'Ma Shan Zheng', cursive;
        }

        body.dark-mode {
            --bg-body: #1c1917;
            --bg-card: #292524;
            --bg-header: rgba(28, 25, 23, 0.95);
            --text-main: #e7e5e4;
            --text-secondary: #a8a29e;
            --border: #44403c;
            --paper: #292524;
            --primary: #d6d3d1;
            --accent: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-serif);
            background-color: var(--bg-body);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2357534e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; transition: all 0.2s; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-header);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            height: 4.5rem;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-art);
            font-size: 1.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid var(--border-dark);
            color: var(--text-main);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(0,0,0,0.02);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            flex: 1;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-family: var(--font-art);
        }
        
        .page-title p { color: var(--text-secondary); font-family: var(--font-serif); }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

        .stat-icon {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--primary);
            background-color: rgba(0,0,0,0.03);
            border: 1px solid var(--border);
        }

        .stat-info .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
            font-family: monospace;
        }
        .stat-info .label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Filter Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Works Grid */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .work-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            gap: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        /* 装饰角 */
        .work-card::before {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--border); pointer-events: none; opacity: 0.5;
        }

        .work-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--secondary);
        }

        .work-cover {
            width: 90px;
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid var(--border-dark);
            background-color: var(--bg-body);
            flex-shrink: 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .work-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }

        .work-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--primary);
            font-family: var(--font-serif);
        }

        .work-status {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
            border-radius: 999px;
            width: fit-content;
            margin-bottom: 0.75rem;
            font-weight: 600;
            border: 1px solid currentColor;
        }

        .status-serial { color: var(--accent); border-color: var(--accent); }
        .status-done { color: #15803d; border-color: #15803d; }
        .status-draft { color: var(--text-secondary); border-color: var(--text-secondary); }

        .work-data {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .work-actions {
            margin-top: auto;
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.375rem;
            border-radius: 2px;
            border: 1px solid var(--border-dark);
            background-color: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(0,0,0,0.02);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <i class="fas fa-ink-well"></i>
                <span>小说精品屋</span>
            </a>
            <div class="header-actions">
                <a href="/static/creation.html" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i>
                    返回创作中心
                </a>
                <button id="btnReaderCenter" class="btn btn-outline">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1>作品管理</h1>
                <p>文房四宝，皆已备齐</p>
            </div>
            <a href="/static/create_new_book.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> 新建作品
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-info">
                    <div class="value" id="totalCount">3</div>
                    <div class="label">作品总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-pen-nib"></i>
                </div>
                <div class="stat-info">
                    <div class="value" id="serialCount">2</div>
                    <div class="label">连载中</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="stat-info">
                    <div class="value" id="draftCount">1</div>
                    <div class="label">草稿箱</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active">全部</div>
            <div class="tab">连载中</div>
            <div class="tab">已完结</div>
            <div class="tab">草稿</div>
        </div>

        <div class="works-grid" id="worksGrid">
            <!-- Dynamic Content -->
            <div class="work-card" onclick="alert('编辑功能开发中')">
                <img src="https://via.placeholder.com/90x135" class="work-cover">
                <div class="work-content">
                    <div class="work-title">无敌从签到开始</div>
                    <div class="work-status status-serial">连载中</div>
                    <div class="work-data">
                        <span><i class="fas fa-eye"></i> 1.2万</span>
                        <span><i class="fas fa-star"></i> 520</span>
                    </div>
                    <div class="work-actions">
                        <button class="action-btn">章节管理</button>
                        <button class="action-btn">作品设置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('novel-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // Mock Data Loading
            // In a real app, fetch from backend
        });
    </script>
</body>
</html>
