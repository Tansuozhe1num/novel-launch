<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读者中心 - 小说精品屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 水墨风配色系统 */
            --primary: #2c2c2c;
            --primary-hover: #000000;
            --secondary: #57534e;
            --accent: #b91c1c;
            --paper: #f7f5f0;
            
            --bg-body: #f7f5f0;
            --bg-card: #ffffff;
            --bg-header: rgba(247, 245, 240, 0.95);
            --bg-sidebar: #ffffff;
            
            --text-main: #1c1917;
            --text-secondary: #57534e;
            --text-light: #a8a29e;
            
            --border: #e7e5e4;
            --border-dark: #d6d3d1;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            
            --radius: 0.5rem;
            --font-serif: 'Noto Serif SC', serif;
            --font-art: 'Ma Shan Zheng', cursive;
        }

        body.dark-mode {
            --bg-body: #1c1917;
            --bg-card: #292524;
            --bg-header: rgba(28, 25, 23, 0.95);
            --bg-sidebar: #292524;
            --text-main: #e7e5e4;
            --text-secondary: #a8a29e;
            --border: #44403c;
            --paper: #292524;
            --primary: #d6d3d1;
            --accent: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-serif);
            background-color: var(--bg-body);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2357534e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; transition: all 0.2s; }
        ul { list-style: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }

        /* 头部导航 */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-header);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            height: 4.5rem;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-art);
            font-size: 1.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }

        .btn-outline {
            border: 1px solid var(--border-dark);
            color: var(--text-main);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(0,0,0,0.02);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger); /* Note: danger color usually needs to be defined or keep using red */
            color: #ef4444;
        }
        .btn-danger:hover {
            background-color: #ef4444;
            color: white;
        }

        /* 布局 */
        .layout-container {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr;
            max-width: 1280px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* 侧边栏 */
        .sidebar {
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border);
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 6rem;
            box-shadow: var(--shadow-sm);
        }

        .user-card {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: var(--primary);
            color: #f7f5f0;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-family: var(--font-art);
            border: 4px solid var(--paper);
            box-shadow: 0 0 0 1px var(--border);
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: var(--font-serif);
        }

        .user-role {
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.125rem 0.75rem;
            border-radius: 999px;
            display: inline-block;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(0,0,0,0.02);
            color: var(--primary);
            padding-left: 1.25rem;
        }

        .nav-item.active {
            background-color: rgba(0,0,0,0.03);
            color: var(--primary);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        /* 主内容区 */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .stat-card:hover { transform: translateY(-2px); }

        .stat-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .stat-info .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: monospace;
        }

        .content-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0,0,0,0.01);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 1.25em;
            background-color: var(--accent);
        }

        .book-list {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2rem;
        }

        .book-item {
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .book-item:hover { transform: translateY(-4px); }

        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid var(--border);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .book-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-author {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
            }
            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
            .nav-item {
                white-space: nowrap;
                border-left: none;
                border-bottom: 3px solid transparent;
            }
            .nav-item.active {
                border-left: none;
                border-bottom-color: var(--accent);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <i class="fas fa-ink-well"></i>
                <span>小说精品屋</span>
            </a>
            <div class="header-actions">
                <a href="/" class="btn btn-outline">
                    <i class="fas fa-home"></i>
                    返回首页
                </a>
                <button id="btnLogout" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i>
                    退出
                </button>
            </div>
        </div>
    </header>

    <div class="layout-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="user-card">
                <div class="avatar" id="userAvatar">U</div>
                <h3 class="user-name" id="userName">加载中...</h3>
                <span class="user-role">VIP读者</span>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="switchTab('dashboard')">
                    <i class="fas fa-chart-pie"></i>
                    <span>概览</span>
                </div>
                <div class="nav-item" onclick="switchTab('bookshelf')">
                    <i class="fas fa-book"></i>
                    <span>我的书架</span>
                </div>
                <div class="nav-item" onclick="switchTab('history')">
                    <i class="fas fa-history"></i>
                    <span>阅读历史</span>
                </div>
                <div class="nav-item" onclick="switchTab('settings')">
                    <i class="fas fa-cog"></i>
                    <span>账号设置</span>
                </div>
            </nav>
        </aside>

        <!-- 主面板 -->
        <main class="main-panel" id="contentArea">
            <!-- 仪表盘内容 -->
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-book-reader"></i>
                    </div>
                    <div class="stat-info">
                        <h3>阅读时长</h3>
                        <div class="value" id="readingTime">0h</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-bookmark"></i>
                    </div>
                    <div class="stat-info">
                        <h3>收藏书籍</h3>
                        <div class="value" id="bookshelfCount">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div class="stat-info">
                        <h3>连续签到</h3>
                        <div class="value" id="checkInDays">0</div>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">最近阅读</h3>
                    <button class="btn btn-outline" style="font-size: 0.8rem; padding: 0.25rem 0.75rem;">查看全部</button>
                </div>
                <div class="book-list" id="recentBooks">
                    <!-- JS动态生成 -->
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查暗色模式
            if (localStorage.getItem('novel-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // 检查Token
            const token = localStorage.getItem('auth_token');
            if(!token){
                location.replace('/static/auth.html');
                return;
            }

            // 获取用户信息
            fetch('/user/profile', {
                headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + token }
            }).then(r=>r.json()).then(resp=>{
                const code = resp && resp.code;
                if (code !== 0) { 
                    // Token失效或错误
                    localStorage.removeItem('auth_token');
                    location.replace('/static/auth.html'); 
                    return; 
                }
                const data = resp && resp.data || {};
                const userName = String(data.userName || localStorage.getItem('last_user_name') || '读者');
                const userInitial = userName.charAt(0).toUpperCase();

                document.getElementById('userAvatar').textContent = userInitial;
                document.getElementById('userName').textContent = userName;

                // 模拟数据
                document.getElementById('bookshelfCount').textContent = Math.floor(Math.random() * 20) + 5;
                document.getElementById('readingTime').textContent = (Math.random() * 100).toFixed(1) + 'h';
                document.getElementById('checkInDays').textContent = Math.floor(Math.random() * 30) + 1;

                loadRecentBooks();
            }).catch(()=>{ 
                // 网络错误等
                location.replace('/static/auth.html'); 
            });

            // 退出登录
            document.getElementById('btnLogout').addEventListener('click', function() {
                if (!confirm('确定要退出登录吗？')) return;
                const tk = localStorage.getItem('auth_token')||'';
                fetch('/user/logout', { method:'POST', headers: { 'Authorization': 'Bearer '+tk } })
                    .finally(function(){
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('last_user_name');
                        alert('已成功退出登录');
                        location.href = '/';
                    });
            });
        });

        function loadRecentBooks() {
            const container = document.getElementById('recentBooks');
            const books = [
                { title: '星辰变', author: '我吃西红柿', cover: 'https://via.placeholder.com/180x240/4f46e5/ffffff?text=星辰变' },
                { title: '全职高手', author: '蝴蝶蓝', cover: 'https://via.placeholder.com/180x240/0ea5e9/ffffff?text=全职高手' },
                { title: '凡人修仙传', author: '忘语', cover: 'https://via.placeholder.com/180x240/f59e0b/ffffff?text=凡人修仙传' },
                { title: '斗破苍穹', author: '天蚕土豆', cover: 'https://via.placeholder.com/180x240/ef4444/ffffff?text=斗破苍穹' },
                { title: '遮天', author: '辰东', cover: 'https://via.placeholder.com/180x240/10b981/ffffff?text=遮天' }
            ];

            container.innerHTML = books.map(book => `
                <div class="book-item">
                    <img src="${book.cover}" alt="${book.title}" class="book-cover">
                    <div class="book-name">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                </div>
            `).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tabId === 'bookshelf') {
                document.querySelector('.card-title').textContent = '我的书架';
            } else if (tabId === 'history') {
                document.querySelector('.card-title').textContent = '阅读历史';
            } else if (tabId === 'settings') {
                alert('设置功能开发中...');
            } else {
                document.querySelector('.card-title').textContent = '最近阅读';
            }
        }
    </script>
</body>
</html>
