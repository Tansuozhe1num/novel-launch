<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 小说精品屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 水墨风配色系统 */
            --primary: #2c2c2c;
            --primary-hover: #000000;
            --secondary: #57534e;
            --accent: #b91c1c;
            --paper: #f7f5f0;
            
            --bg-body: #f7f5f0;
            --bg-card: #ffffff;
            --bg-input: #fdfbf7;
            
            --text-main: #1c1917;
            --text-secondary: #57534e;
            
            --border: #e7e5e4;
            --border-dark: #d6d3d1;
            
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --radius: 4px;
            
            --font-serif: 'Noto Serif SC', serif;
            --font-art: 'Ma Shan Zheng', cursive;
        }

        body.dark-mode {
            --bg-body: #1c1917;
            --bg-card: #292524;
            --bg-input: #1c1917;
            --text-main: #e7e5e4;
            --text-secondary: #a8a29e;
            --border: #44403c;
            --primary: #d6d3d1;
            --accent: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-serif);
            background-color: var(--bg-body);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2357534e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; transition: color 0.2s; }
        button { font-family: inherit; }

        /* 头部导航 */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 50;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-art);
            font-size: 1.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .back-btn {
            font-size: 1rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.5);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .back-btn:hover { color: var(--accent); background: rgba(255,255,255,0.8); }

        /* 认证卡片 */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1.5rem 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-card);
            padding: 3rem;
            border: 1px solid var(--border);
            position: relative;
            box-shadow: var(--shadow);
        }
        /* 装饰角 */
        .auth-card::before {
            content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid var(--border); pointer-events: none;
        }

        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-title { 
            font-family: var(--font-art);
            font-size: 2.2rem; 
            color: var(--primary); 
            margin-bottom: 0.5rem; 
        }
        .auth-subtitle { color: var(--text-secondary); font-size: 0.95rem; }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .auth-tab:hover:not(.active) { color: var(--primary); }

        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.95rem; color: var(--primary); }
        .form-input {
            width: 100%;
            padding: 0.75rem 0.5rem;
            border: none;
            border-bottom: 1px solid var(--border-dark);
            background-color: transparent;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
            font-family: var(--font-serif);
        }
        .form-input:focus { outline: none; border-bottom-color: var(--accent); background-color: rgba(0,0,0,0.01); }
        .form-input::placeholder { color: #d6d3d1; }
        
        .error-message { color: var(--accent); font-size: 0.85rem; margin-top: 0.4rem; display: none; }
        .error-message.show { display: block; }
        .success-message {
            color: #15803d; border: 1px solid #86efac; background-color: #f0fdf4;
            padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.9rem; display: none; text-align: center;
        }
        .success-message.show { display: block; }

        .password-container { position: relative; }
        .password-toggle {
            position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
        }
        .password-toggle:hover { color: var(--accent); }

        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); }
        .forgot-password { color: var(--text-secondary); text-decoration: underline; }
        .forgot-password:hover { color: var(--accent); }

        .btn {
            width: 100%; padding: 0.875rem; border-radius: 2px; font-weight: 600; font-size: 1.1rem;
            border: 1px solid var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: all 0.3s;
            font-family: var(--font-serif);
            background-color: var(--primary);
            color: #f7f5f0;
        }
        .btn:hover { background-color: var(--accent); border-color: var(--accent); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .auth-footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary); }
        .auth-footer a { color: var(--primary); font-weight: 600; border-bottom: 1px solid var(--primary); }
        .auth-footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

        @media (max-width: 576px) {
            .auth-card { padding: 2rem 1.5rem; border: none; box-shadow: none; background: transparent; }
            .auth-card::before { display: none; }
            header { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-ink-well"></i>
            <span>小说精品屋</span>
        </div>
        <a href="/" class="back-btn"><i class="fas fa-long-arrow-alt-left"></i> 返回首页</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">书香门第</h1>
                <p class="auth-subtitle">静心阅读，品味人生</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登 录</div>
                <div class="auth-tab" data-tab="register">注 册</div>
            </div>

            <!-- 登录表单 -->
            <form class="auth-form active" id="loginForm">
                <div class="success-message" id="loginSuccess"><i class="fas fa-check-circle"></i> 登录成功，正在跳转...</div>

                <div class="form-group">
                    <label class="form-label" for="loginUsername">账号</label>
                    <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名">
                    <div class="error-message" id="loginUsernameError">请输入有效的用户名</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">密码</label>
                    <div class="password-container">
                        <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
                        <button type="button" class="password-toggle" id="loginPasswordToggle"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="error-message" id="loginPasswordError">密码不能为空</div>
                </div>

                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" style="accent-color: var(--primary);">
                        <label for="rememberMe" style="cursor:pointer">记住我</label>
                    </div>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    立即登录
                </button>

                <div class="auth-footer">还没有账户？ <a href="#" id="switchToRegister">去注册</a></div>
            </form>

            <!-- 注册表单 -->
            <form class="auth-form" id="registerForm">
                <div class="success-message" id="registerSuccess"><i class="fas fa-check-circle"></i> 注册成功，请登录</div>

                <div class="form-group">
                    <label class="form-label" for="registerUsername">账号</label>
                    <input type="text" id="registerUsername" class="form-input" placeholder="请输入用户名">
                    <div class="error-message" id="registerUsernameError">用户名应为3-20位字母、数字或下划线</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerPassword">密码</label>
                    <div class="password-container">
                        <input type="password" id="registerPassword" class="form-input" placeholder="请输入密码">
                        <button type="button" class="password-toggle" id="registerPasswordToggle"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="error-message" id="registerPasswordError">密码长度至少6位</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerConfirmPassword">确认密码</label>
                    <div class="password-container">
                        <input type="password" id="registerConfirmPassword" class="form-input" placeholder="请再次输入密码">
                        <button type="button" class="password-toggle" id="registerConfirmPasswordToggle"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="error-message" id="registerConfirmPasswordError">两次输入的密码不一致</div>
                </div>

                <button type="submit" class="btn" id="registerBtn">
                    立即注册
                </button>

                <div class="auth-footer">已有账户？ <a href="#" id="switchToLogin">去登录</a></div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme Check
            if (localStorage.getItem('novel-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // Tabs
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    forms.forEach(form => {
                        form.classList.remove('active');
                        if (form.id === `${tabId}Form`) form.classList.add('active');
                    });
                });
            });

            document.getElementById('switchToRegister').addEventListener('click', function(e) { e.preventDefault(); document.querySelector('[data-tab="register"]').click(); });
            document.getElementById('switchToLogin').addEventListener('click', function(e) { e.preventDefault(); document.querySelector('[data-tab="login"]').click(); });

            // Password Toggle
            document.querySelectorAll('.password-toggle').forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    const icon = this.querySelector('i');
                    if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
                    else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
                });
            });

            // Helpers
            function showError(id, msg) {
                const el = document.getElementById(id);
                if (el) { el.textContent = msg; el.classList.add('show'); }
            }
            function hideError(id) {
                const el = document.getElementById(id);
                if (el) { el.classList.remove('show'); }
            }

            // Login
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                let isValid = true;

                if (!username) { showError('loginUsernameError', '请输入用户名'); isValid = false; } else { hideError('loginUsernameError'); }
                if (!password) { showError('loginPasswordError', '请输入密码'); isValid = false; } else { hideError('loginPasswordError'); }

                if (isValid) {
                    const btn = document.getElementById('loginBtn');
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...'; btn.disabled = true;
                    fetch('/user/login', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: username, password })
                    }).then(r=>r.json()).then(resp=>{
                        if (resp && (resp.code === 0 || resp.code === 200)) {
                            const token = (resp.data && resp.data.token) || resp.token;
                            if (token) localStorage.setItem('auth_token', token);
                            localStorage.setItem('last_user_name', username);
                            document.getElementById('loginSuccess').classList.add('show');
                            setTimeout(() => { window.location.href = '/static/readercentor.html' }, 800);
                        } else {
                            showError('loginUsernameError', resp.msg || '登录失败');
                        }
                    }).catch(()=>{ showError('loginUsernameError', '网络错误'); })
                    .finally(()=>{ btn.innerHTML = '立即登录'; btn.disabled = false; });
                }
            });

            // Register
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('registerUsername').value.trim();
                const password = document.getElementById('registerPassword').value.trim();
                const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
                let isValid = true;

                if (!username) { showError('registerUsernameError', '请输入用户名'); isValid = false; } else { hideError('registerUsernameError'); }
                if (!password) { showError('registerPasswordError', '请输入密码'); isValid = false; } else { hideError('registerPasswordError'); }
                if (password !== confirmPassword) { showError('registerConfirmPasswordError', '两次密码不一致'); isValid = false; } else { hideError('registerConfirmPasswordError'); }

                if (isValid) {
                    const btn = document.getElementById('registerBtn');
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...'; btn.disabled = true;
                    fetch('/user/register', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: username, password })
                    }).then(r=>r.json()).then(resp=>{
                        if (resp && (resp.code === 0 || resp.code === 200)) {
                            document.getElementById('registerSuccess').classList.add('show');
                            document.getElementById('loginUsername').value = username;
                            setTimeout(() => { document.querySelector('[data-tab="login"]').click() }, 1000);
                        } else {
                            showError('registerUsernameError', resp.msg || '注册失败');
                        }
                    }).catch(()=>{ showError('registerUsernameError', '网络错误'); })
                    .finally(()=>{ btn.innerHTML = '立即注册'; btn.disabled = false; });
                }
            });
        });
    </script>
</body>
</html>
