<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 小说精品屋</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-dark: #7c3aed;
            --secondary: #06d6a0;
            --accent: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --darker: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;

            --font-title: 'Noto Serif SC', serif;
            --font-body: 'Noto Sans SC', sans-serif;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

            --radius: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease;
            position: relative;
            overflow-x: hidden;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0c1220 0%, #1a2335 100%);
            color: #e2e8f0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 背景动画容器 */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 蒲公英样式 */
        .dandelion {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.3) 70%);
            border-radius: 50%;
            filter: blur(0.5px);
            opacity: 0.7;
            animation-name: float, sway;
            animation-timing-function: ease-in-out, ease-in-out;
            animation-iteration-count: infinite;
        }

        @keyframes float {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        @keyframes sway {
            0%, 100% { margin-left: 0; }
            50% { margin-left: 20px; }
        }

        /* 星空样式 */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 8s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 头部导航 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 0;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        body.dark-mode header {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            font-family: var(--font-title);
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            font-size: 28px;
            color: var(--primary);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        body.dark-mode .back-btn {
            color: #e2e8f0;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* 主要内容 */
        .auth-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        body.dark-mode .auth-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: var(--font-title);
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-subtitle {
            color: var(--gray);
            font-size: 16px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-radius: var(--radius);
            overflow: hidden;
            background: rgba(248, 250, 252, 0.8);
        }

        body.dark-mode .auth-tabs {
            background: rgba(51, 65, 85, 0.8);
        }

        .auth-tab {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .auth-tab:not(.active):hover {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        body.dark-mode .form-label {
            color: #e2e8f0;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1px solid rgba(226, 232, 240, 0.8);
            background: rgba(248, 250, 252, 0.8);
            font-size: 16px;
            transition: all 0.3s ease;
            color: var(--dark);
        }

        body.dark-mode .form-input {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .form-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
        }

        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 16px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .btn:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--dark);
        }

        body.dark-mode .btn-outline {
            color: #e2e8f0;
            border-color: #475569;
        }

        .btn-outline:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--gray);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(226, 232, 240, 0.8);
        }

        body.dark-mode .divider::before,
        body.dark-mode .divider::after {
            background: rgba(51, 65, 85, 0.8);
        }

        .divider-text {
            padding: 0 12px;
            font-size: 14px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid rgba(226, 232, 240, 0.8);
            background: rgba(248, 250, 252, 0.8);
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        body.dark-mode .social-btn {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
        }

        .social-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            color: var(--dark);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 101;
        }

        body.dark-mode .theme-toggle {
            color: #e2e8f0;
        }

        .theme-toggle:hover {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        /* 响应式设计 */
        @media (max-width: 576px) {
            .auth-card {
                padding: 24px;
            }

            .social-login {
                flex-direction: column;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景动画容器 -->
    <div class="background-animation" id="backgroundAnimation"></div>

    <!-- 头部导航 -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>小说精品屋</span>
                </div>
                <a href="/" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    返回首页
                </a>
            </div>
        </div>
    </header>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- 主要内容 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">欢迎回来</h1>
                <p class="auth-subtitle">登录您的账户继续阅读</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>

            <!-- 登录表单 -->
            <form class="auth-form active" id="loginForm">
                <div class="success-message" id="loginSuccess">
                    <i class="fas fa-check-circle"></i> 登录成功！正在跳转...
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名">
                    <div class="error-message" id="loginUsernameError">请输入有效的用户名</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">密码</label>
                    <div class="password-container">
                        <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
                        <button type="button" class="password-toggle" id="loginPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="loginPasswordError">密码不能为空</div>
                </div>

                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">记住我</label>
                    </div>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    登录
                </button>

                <div class="divider">
                    <span class="divider-text">或使用以下方式登录</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-weixin"></i>
                        微信
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-qq"></i>
                        QQ
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-weibo"></i>
                        微博
                    </button>
                </div>

                <div class="auth-footer">
                    还没有账户？ <a href="#" id="switchToRegister">立即注册</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form class="auth-form" id="registerForm">
                <div class="success-message" id="registerSuccess">
                    <i class="fas fa-check-circle"></i> 注册成功！请登录您的账户
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" class="form-input" placeholder="请输入用户名">
                    <div class="error-message" id="registerUsernameError">用户名应为3-20位字母、数字或下划线</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="请输入邮箱">
                    <div class="error-message" id="registerEmailError">请输入有效的邮箱地址</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerPassword">密码</label>
                    <div class="password-container">
                        <input type="password" id="registerPassword" class="form-input" placeholder="请输入密码">
                        <button type="button" class="password-toggle" id="registerPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="registerPasswordError">密码长度至少6位</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="registerConfirmPassword">确认密码</label>
                    <div class="password-container">
                        <input type="password" id="registerConfirmPassword" class="form-input" placeholder="请再次输入密码">
                        <button type="button" class="password-toggle" id="registerConfirmPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="registerConfirmPasswordError">两次输入的密码不一致</div>
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    注册
                </button>

                <div class="divider">
                    <span class="divider-text">或使用以下方式注册</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-weixin"></i>
                        微信
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-qq"></i>
                        QQ
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-weibo"></i>
                        微博
                    </button>
                </div>

                <div class="auth-footer">
                    已有账户？ <a href="#" id="switchToLogin">立即登录</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 主题切换功能
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const backgroundAnimation = document.getElementById('backgroundAnimation');

            // 检查本地存储的主题设置
            const savedTheme = localStorage.getItem('novel-theme') || 'light';
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                createStars();
            } else {
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                createDandelions();
            }

            // 切换主题
            themeToggle.addEventListener('click', function() {
                body.classList.toggle('dark-mode');

                if (body.classList.contains('dark-mode')) {
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                    localStorage.setItem('novel-theme', 'dark');
                    backgroundAnimation.innerHTML = '';
                    createStars();
                } else {
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                    localStorage.setItem('novel-theme', 'light');
                    backgroundAnimation.innerHTML = '';
                    createDandelions();
                }
            });

            // 创建蒲公英动画
            function createDandelions() {
                for (let i = 0; i < 15; i++) {
                    const dandelion = document.createElement('div');
                    dandelion.className = 'dandelion';

                    // 随机位置
                    const left = Math.random() * 100;
                    dandelion.style.left = `${left}%`;

                    // 随机大小
                    const size = Math.random() * 0.8 + 0.6;
                    dandelion.style.transform = `scale(${size})`;

                    // 随机动画时长
                    const duration = Math.random() * 20 + 30;
                    const delay = Math.random() * 15;
                    dandelion.style.animationDuration = `${duration}s, ${Math.random() * 4 + 3}s`;
                    dandelion.style.animationDelay = `${delay}s, ${Math.random() * 2}s`;

                    backgroundAnimation.appendChild(dandelion);
                }
            }

            // 创建星空动画
            function createStars() {
                for (let i = 0; i < 80; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';

                    // 随机位置
                    const left = Math.random() * 100;
                    const top = Math.random() * 100;
                    star.style.left = `${left}%`;
                    star.style.top = `${top}%`;

                    // 随机大小
                    const size = Math.random() * 2 + 1;
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;

                    // 随机动画延迟
                    const delay = Math.random() * 8;
                    star.style.animationDelay = `${delay}s`;

                    backgroundAnimation.appendChild(star);
                }
            }

            // 选项卡切换
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');

                    // 更新选项卡状态
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');

                    // 更新表单显示
                    forms.forEach(form => {
                        form.classList.remove('active');
                        if (form.id === `${tabId}Form`) {
                            form.classList.add('active');
                        }
                    });
                });
            });

            // 切换登录/注册链接
            document.getElementById('switchToRegister').addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector('[data-tab="register"]').click();
            });

            document.getElementById('switchToLogin').addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector('[data-tab="login"]').click();
            });

            // 密码显示/隐藏切换
            const passwordToggles = document.querySelectorAll('.password-toggle');

            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    const icon = this.querySelector('i');

                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });

            // 表单验证和提交
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            // 登录表单提交
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;

                let isValid = true;

                // 验证用户名
                if (username === '') {
                    showError('loginUsernameError', '请输入用户名');
                    isValid = false;
                } else {
                    hideError('loginUsernameError');
                }

                // 验证密码
                if (password === '') {
                    showError('loginPasswordError', '请输入密码');
                    isValid = false;
                } else {
                    hideError('loginPasswordError');
                }

                if (isValid) {
                    const btn = document.getElementById('loginBtn');
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
                    btn.disabled = true;
                    fetch('/user/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ name: username, password })
                    }).then(r=>r.json()).then(resp=>{
                        const code = resp && resp.code; const msg = resp && resp.msg || '';
                        if (code === 0 || code === 200) {
                            try {
                                const token = (resp && resp.data && resp.data.token) || resp.token || '';
                                if (token) localStorage.setItem('auth_token', token);
                                localStorage.setItem('last_user_name', username);
                            } catch(e) {}
                            document.getElementById('loginSuccess').classList.add('show');
                            setTimeout(() => { window.location.href = '/static/readercentor.html' }, 800);
                        } else {
                            showError('loginUsernameError', msg || '登录失败');
                        }
                    }).catch(()=>{
                        showError('loginUsernameError', '网络错误');
                    }).finally(()=>{
                        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
                        btn.disabled = false;
                    });
                }
            });

            // 注册表单提交
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = document.getElementById('registerUsername').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const password = document.getElementById('registerPassword').value.trim();
                const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();

                let isValid = true;

                if (username === '') { showError('registerUsernameError', '请输入用户名'); isValid = false }
                else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { showError('registerUsernameError', '用户名应为3-20位字母、数字或下划线'); isValid = false }
                else { hideError('registerUsernameError') }

                if (email !== '' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showError('registerEmailError', '请输入有效的邮箱地址');
                    isValid = false;
                } else {
                    hideError('registerEmailError');
                }

                function validPassword(p){ if(p.length<6 || p.length>12) return false; if(!/[0-9]/.test(p)) return false; if(!/[a-zA-Z]/.test(p)) return false; if(/[^0-9a-zA-Z]/.test(p)) return false; return true }
                if (password === '') { showError('registerPasswordError', '请输入密码'); isValid = false }
                else if (!validPassword(password)) { showError('registerPasswordError', '密码格式错误, 密码格式要求6 - 12位数字，需要由字母 + 数字'); isValid = false }
                else { hideError('registerPasswordError') }

                if (confirmPassword === '') { showError('registerConfirmPasswordError', '请再次输入密码'); isValid = false }
                else if (password !== confirmPassword) { showError('registerConfirmPasswordError', '两次输入的密码不一致'); isValid = false }
                else { hideError('registerConfirmPasswordError') }

                if (!isValid) return;

                const btn = document.getElementById('registerBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
                btn.disabled = true;

                fetch('/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ name: username, password })
                }).then(r=>r.json()).then(resp=>{
                    const code = resp && resp.code; const msg = resp && resp.msg || '';
                    if (code === 0 || code === 200) {
                        document.getElementById('registerSuccess').classList.add('show');
                        document.getElementById('loginUsername').value = username;
                        setTimeout(() => { document.querySelector('[data-tab="login"]').click() }, 800);
                    } else {
                        const exists = /存在/.test(String(msg)) || code === 2000012;
                        if (exists) {
                            showError('registerUsernameError', '用户名已存在，请直接登录');
                            document.getElementById('loginUsername').value = username;
                            setTimeout(() => { document.querySelector('[data-tab="login"]').click() }, 300);
                        } else {
                            showError('registerUsernameError', msg || '注册失败');
                        }
                    }
                }).catch(()=>{
                    showError('registerUsernameError', '网络错误');
                }).finally(()=>{
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
                    btn.disabled = false;
                });
            });

            // 显示错误消息
            function showError(elementId, message) {
                const errorElement = document.getElementById(elementId);
                errorElement.textContent = message;
                errorElement.classList.add('show');

                // 高亮显示错误输入框
                const inputId = elementId.replace('Error', '');
                const inputElement = document.getElementById(inputId);
                if (inputElement) {
                    inputElement.classList.add('error');
                }
            }

            // 隐藏错误消息
            function hideError(elementId) {
                const errorElement = document.getElementById(elementId);
                errorElement.classList.remove('show');

                // 移除输入框错误样式
                const inputId = elementId.replace('Error', '');
                const inputElement = document.getElementById(inputId);
                if (inputElement) {
                    inputElement.classList.remove('error');
                }
            }

            // 实时验证输入
            document.getElementById('registerUsername').addEventListener('input', function() {
                const username = this.value.trim();
                if (username && !/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                    showError('registerUsernameError', '用户名应为3-20位字母、数字或下划线');
                } else {
                    hideError('registerUsernameError');
                }
            });

            document.getElementById('registerEmail').addEventListener('input', function() {
                const email = this.value.trim();
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showError('registerEmailError', '请输入有效的邮箱地址');
                } else {
                    hideError('registerEmailError');
                }
            });

            document.getElementById('registerPassword').addEventListener('input', function() {
                const password = this.value;
                if (password && password.length < 6) {
                    showError('registerPasswordError', '密码长度至少6位');
                } else {
                    hideError('registerPasswordError');
                }
            });

            document.getElementById('registerConfirmPassword').addEventListener('input', function() {
                const password = document.getElementById('registerPassword').value;
                const confirmPassword = this.value;
                if (confirmPassword && password !== confirmPassword) {
                    showError('registerConfirmPasswordError', '两次输入的密码不一致');
                } else {
                    hideError('registerConfirmPasswordError');
                }
            });
        });
    </script>
</body>
</html>
